<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid is always at the top</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .data-box {
            background: rgba(15, 23, 42, 0.5);
            padding: 1.2rem;
            border-radius: 12px;
            border: 1px dashed #475569;
            margin-bottom: 1.5rem;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .data-box:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        #content {
            font-family: 'Fira Code', monospace;
            word-break: break-all;
            font-size: 1.1rem;
            color: #e2e8f0;
        }

        .copy-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .copy-btn:hover {
            background-color: var(--primary-hover);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .copy-btn:active {
            transform: scale(0.98);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            background: #22c55e;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 500;
            transform: translateY(100px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Rapid is always at the top</h1>
        <p>t.me/rapidstealerxx</p>
        
        <div class="data-box" onclick="copyAction()">
            <div id="content">Loading token...</div>
        </div>

        <button class="copy-btn" onclick="copyAction()">
            <span id="btn-token">Copy to Clipboard</span>
        </button>
    </div>

    <div id="toast" class="toast">Copied to clipboard ✓</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tokenToCopy = urlParams.get('token') || "Missing parameter!";
        
        const contentDiv = document.getElementById('content');
        const toast = document.getElementById('toast');
        const btnToken = document.getElementById('btn-token');

        contentDiv.innerText = tokenToCopy;

        function copyAction() {
            if (!tokenToCopy || tokenToCopy === "Missing parameter!") return;

            navigator.clipboard.writeText(tokenToCopy).then(() => {
                showToast();
                btnToken.innerText = "Copied!";
                
                setTimeout(() => {
                    btnToken.innerText = "Copy to Clipboard";
                }, 2000);
            }).catch(err => {
                console.error(err);
            });
        }

        function showToast() {
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
    </script>
</body>
</html>
